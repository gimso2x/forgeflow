name: codex
runtime_type: cli-agent
input_mode: prompt-and-files
output_mode: markdown-and-files
supports_roles:
  - coordinator
  - planner
  - worker
  - spec-reviewer
  - quality-reviewer
supports_generated_files: true
generated_filename: CODEX.md
recommended_location: ./CODEX.md
surface_style: root-instruction-file
handoff_format: artifacts-plus-git-diff
installation_steps:
  - Copy the generated adapter to ./CODEX.md at the repo root.
  - Preserve the canonical review order even when Codex returns git-oriented summaries.
  - Treat Codex recovery guidance as instruction-file UX, not as hook support.
  - For project-local presets, run `python3 scripts/install_agent_presets.py --adapter codex --target /path/to/project --profile nextjs`.
session_persistence: root instruction file persists across repo sessions until regenerated
workspace_boundary: repo root instruction file steers CLI work while emphasizing git-visible workspace changes
review_delivery: git-diff-centric summary plus artifact files checked in the repo
recovery_delivery_note: Codex delivers recovery through CODEX.md instruction guidance, not hooks.
tooling_constraints:
  - git-oriented runtime assumptions may exist
  - generated artifacts must not redefine canonical semantics
  - Codex recovery guidance
  - After an edit/write failure, re-read the target file before retrying
  - For large files or oversized output, use targeted search or chunked reads
  - After three repeated command or tool failures, stop and change strategy
  - Speed shortcuts such as /fast must not skip artifact gates
