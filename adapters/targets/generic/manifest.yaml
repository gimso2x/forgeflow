name: generic
runtime_type: cli-agent-or-ide
input_mode: prompt-and-files
output_mode: markdown-and-files
supports_roles:
  - coordinator
  - planner
  - worker
  - spec-reviewer
  - quality-reviewer
supports_generated_files: true
generated_filename: FORGEFLOW.md
recommended_location: ./FORGEFLOW.md
surface_style: root-instruction-file
handoff_format: artifacts-plus-terminal-summary
installation_steps:
  - Copy the generated FORGEFLOW.md to your project root alongside your agent's instruction file (AGENTS.md, .cursorrules, .aider.conf.yml, etc).
  - Adapt the role-to-agent mapping for your specific tool — this is a reference template, not a runtime adapter.
  - Verify your agent reads FORGEFLOW.md or includes its content in the project context before starting work.
session_persistence: root instruction file persists across sessions until regenerated or removed
workspace_boundary: agent workspace is defined by the agent's own project scope; ForgeFlow artifacts remain repo-local source of truth
review_delivery: agent-native output (terminal, chat, or diff) plus ForgeFlow artifact files in the repo
recovery_delivery_note: Generic agents receive recovery guidance through the instruction file only — no hooks, no CLI integration.
tooling_constraints:
  - This is a documentation template, not a supported runtime adapter
  - Map ForgeFlow artifacts to your agent's native concepts — do not invent commands
  - Preserve all schema keys and enums from canonical ForgeFlow artifacts
  - Verification is required — agent self-report is never sufficient evidence
  - Do not bypass artifact gates or merge review stages
