version: 0.2
adaptive_routing:
  enabled: false  # opt-in
  weights:
    file_count: 1.0
    estimated_lines: 0.1
    requirement_count: 2.0
    dependency_count: 1.5
    risk_keyword: 3.0
  thresholds:
    low: 10.0
    high: 25.0
routes:
  small:
    stages: [clarify, execute, quality-review, finalize]
    max_retries: 2
    traits:
      - low risk
      - small scope
      - easy rollback
  medium:
    stages: [clarify, plan, execute, quality-review, finalize]
    max_retries: 3
    traits:
      - multiple steps
      - moderate scope
      - verification needed
  large_high_risk:
    stages: [clarify, plan, execute, spec-review, quality-review, finalize, long-run]
    max_retries: 5
    traits:
      - architecture or infra impact
      - hard rollback
      - resume/recovery important
