name: evals

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: evals-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  eval-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run eval fixture checks
        run: make validate-evals
