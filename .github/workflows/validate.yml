name: validate

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no Python files remain
        run: |
          count=$(find . -name '*.py' -not -path './.git/*' -not -path './.venv/*' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "ERROR: Found $count Python files (should be 0)"
            find . -name '*.py' -not -path './.git/*' -not -path './.venv/*'
            exit 1
          fi
          echo "OK: No Python files found"

      - name: Verify all skills have SKILL.md
        run: |
          for dir in skills/*/; do
            name=$(basename "$dir")
            if [[ "$name" == _* ]]; then
              continue
            fi
            if [ ! -f "${dir}SKILL.md" ]; then
              echo "ERROR: Missing SKILL.md in $dir"
              exit 1
            fi
          done
          echo "OK: All public skills have SKILL.md"

      - name: Verify plugin configs are valid JSON
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json .codex-plugin/plugin.json .cursor-plugin/plugin.json gemini-extension.json; do
            if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "ERROR: Invalid JSON in $f"
              exit 1
            fi
          done
          echo "OK: All plugin configs are valid JSON"

      - name: Verify release versions are consistent
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import sys

          root = pathlib.Path.cwd()
          expected = (root / "VERSION").read_text(encoding="utf-8").strip()
          failures = []

          def require(label, actual):
              if actual != expected:
                  failures.append(f"{label}: expected {expected}, got {actual or '<missing>'}")

          skill = (root / "SKILL.md").read_text(encoding="utf-8")
          match = re.search(r'^version:\s*["\']?([^"\'\n]+)["\']?\s*$', skill, re.MULTILINE)
          require("SKILL.md", match.group(1) if match else None)

          for path in [
              ".claude-plugin/plugin.json",
              ".codex-plugin/plugin.json",
              ".cursor-plugin/plugin.json",
              "gemini-extension.json",
          ]:
              data = json.loads((root / path).read_text(encoding="utf-8"))
              require(path, data.get("version"))

          marketplace = json.loads((root / ".claude-plugin/marketplace.json").read_text(encoding="utf-8"))
          require(".claude-plugin/marketplace.json metadata.version", marketplace.get("metadata", {}).get("version"))

          changelog = (root / "CHANGELOG.md").read_text(encoding="utf-8")
          if f"## [{expected}]" not in changelog:
              failures.append(f"CHANGELOG.md: missing ## [{expected}] section")

          readme = (root / "README.md").read_text(encoding="utf-8")
          if "현재 릴리즈:" in readme:
              failures.append("README.md: remove hardcoded current release line")
          if "VERSION" not in readme:
              failures.append("README.md: release policy must reference VERSION")
          for snippet in (
              "## 로컬 검증",
              ".github/workflows/validate.yml",
              "python3 -m json.tool .claude-plugin/plugin.json >/dev/null",
          ):
              if snippet not in readme:
                  failures.append(f"README.md: local validation guidance missing {snippet!r}")

          pyproject = root / "pyproject.toml"
          if pyproject.exists():
              text = pyproject.read_text(encoding="utf-8")
              match = re.search(r'^version\s*=\s*["\']([^"\']+)["\']', text, re.MULTILINE)
              require("pyproject.toml", match.group(1) if match else None)

          if failures:
              print("ERROR: Version consistency check failed")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          print(f"OK: Release versions match VERSION={expected}")
          PY

      - name: Verify templates exist
        run: |
          for t in brief.md plan.md review-report.md implementation-notes.md eval-record.md roadmap.md checkpoint.md run-ledger.md evolution-rule.md ship-summary.md; do
            if [ ! -f "templates/$t" ]; then
              echo "ERROR: Missing template templates/$t"
              exit 1
            fi
          done
          echo "OK: All templates exist"

      - name: Verify skill frontmatter contract
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path("skills")
          required = ("name:", "description:", "validate_prompt:")
          failures = []

          for skill_md in sorted(root.glob("*/SKILL.md")):
              text = skill_md.read_text(encoding="utf-8")
              if not text.startswith("---"):
                  failures.append(f"{skill_md}: missing YAML frontmatter")
                  continue
              fm = text.split("---", 2)[1]
              for field in required:
                  if field not in fm:
                      failures.append(f"{skill_md}: missing {field.rstrip(':')}")
              match = re.search(r"^name:\s*(.+)$", fm, re.MULTILINE)
              if match:
                  name = match.group(1).strip().strip('"').strip("'")
                  if name != skill_md.parent.name:
                      failures.append(f"{skill_md}: name {name} != dir {skill_md.parent.name}")

          if failures:
              print("ERROR: Skill frontmatter check failed")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          print("OK: Skill frontmatter contract satisfied")
          PY

      - name: Verify template cross-references
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          refs = set()
          for skill_md in (root / "skills").glob("*/SKILL.md"):
              text = skill_md.read_text(encoding="utf-8")
              for match in re.finditer(r"templates/([a-zA-Z0-9_-]+\.md)", text):
                  refs.add(match.group(1))

          missing = sorted(t for t in refs if not (root / "templates" / t).exists())
          if missing:
              print("ERROR: Missing template files referenced by skills:")
              for item in missing:
                  print(f"- {item}")
              sys.exit(1)

          print(f"OK: {len(refs)} template references resolve")
          PY

      - name: Verify execute subagent reference prompts
        run: |
          python3 - <<'PY'
          import pathlib
          import sys

          root = pathlib.Path(".")
          required = [
              "skills/execute/references/implementer-prompt.md",
              "skills/execute/references/spec-reviewer-prompt.md",
              "skills/execute/references/quality-reviewer-prompt.md",
          ]
          failures = []
          for rel in required:
              if not (root / rel).exists():
                  failures.append(f"missing {rel}")

          execute_skill = (root / "skills/execute/SKILL.md").read_text(encoding="utf-8")
          for name in ("implementer-prompt.md", "spec-reviewer-prompt.md", "quality-reviewer-prompt.md"):
              if name not in execute_skill:
                  failures.append(f"skills/execute/SKILL.md: missing reference to {name}")

          forgeflow = (root / "skills/forgeflow/SKILL.md").read_text(encoding="utf-8")
          if "skills/execute/references/" not in forgeflow:
              failures.append("skills/forgeflow/SKILL.md: missing skills/execute/references/")

          if failures:
              print("ERROR: Execute subagent reference prompt check failed")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          print("OK: Execute subagent reference prompts present")
          PY

      - name: Verify route scoring parity
        run: |
          python3 - <<'PY'
          import pathlib
          import sys

          snippet = (
              "raw_score = file_count*1.0 + estimated_lines*0.1 + "
              "requirement_count*2.0 + dependency_count*1.5 + risk_keywords*3.0"
          )
          docs = [
              "README.md",
              "SKILL.md",
              "skills/forgeflow/SKILL.md",
              "skills/clarify/SKILL.md",
          ]
          failures = []
          for doc in docs:
              text = (pathlib.Path(doc)).read_text(encoding="utf-8")
              if snippet not in text:
                  failures.append(doc)

          if failures:
              print("ERROR: Route scoring formula missing in:")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          print("OK: Route scoring formula present in core docs")
          PY

      - name: Verify active route vocabulary
        run: |
          python3 - <<'PY'
          import pathlib
          import sys

          root = pathlib.Path(".")
          failures = []
          forbidden = {
              "large_high_risk": "use high or epic",
              "large high risk": "use high or epic",
              "route: low": "use route: small",
              "route: critical": "use route: epic",
          }
          scope = [
              root / "README.md",
              root / "SKILL.md",
              root / "GEMINI.md",
              root / "docs",
              root / "skills",
              root / "templates",
              root / ".claude-plugin",
              root / ".codex-plugin",
              root / ".cursor-plugin",
          ]
          for base in scope:
              paths = [base] if base.is_file() else sorted(base.rglob("*"))
              for path in paths:
                  if not path.is_file() or path.suffix not in {".md", ".json"}:
                      continue
                  text = path.read_text(encoding="utf-8").lower()
                  for needle, guidance in forbidden.items():
                      if needle in text:
                          failures.append(f"{path}: stale route vocabulary {needle!r}; {guidance}")

          if failures:
              print("ERROR: Active route vocabulary drift detected")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          print("OK: Active route vocabulary uses small/medium/high/epic")
          PY

      - name: Verify review and ship artifact contract
        run: |
          python3 - <<'PY'
          import pathlib
          import sys

          root = pathlib.Path(".")
          failures = []

          forbidden = ["review-report-spec.md", "review-report-quality.md"]
          for skill_md in (root / "skills").rglob("*.md"):
              text = skill_md.read_text(encoding="utf-8")
              for name in forbidden:
                  if name in text:
                      failures.append(f"{skill_md}: references deprecated {name}")

          ship = (root / "skills/ship/SKILL.md").read_text(encoding="utf-8")
          if "templates/ship-summary.md" not in ship:
              failures.append("skills/ship/SKILL.md: missing templates/ship-summary.md reference")
          if not (root / "templates/ship-summary.md").exists():
              failures.append("templates/ship-summary.md: missing")

          for path in ["skills/review/SKILL.md", "skills/ship/SKILL.md", "skills/finish/SKILL.md"]:
              if "review-report.md" not in (root / path).read_text(encoding="utf-8"):
                  failures.append(f"{path}: missing review-report.md reference")

          review_template = (root / "templates/review-report.md").read_text(encoding="utf-8")
          if "## Execute Micro-Gates" not in review_template:
              failures.append("templates/review-report.md: missing Execute Micro-Gates section")
          review_skill = (root / "skills/review/SKILL.md").read_text(encoding="utf-8")
          if "Execute Micro-Gates" not in review_skill:
              failures.append("skills/review/SKILL.md: missing Execute Micro-Gates reference")
          for smoke in ["audit-smoke-high", "audit-smoke-epic"]:
              rp = root / "evals/results/smoke-tasks" / smoke / "review-report.md"
              if not rp.exists():
                  failures.append(f"{rp}: missing")
              elif "## Execute Micro-Gates" not in rp.read_text(encoding="utf-8"):
                  failures.append(f"{rp}: missing Execute Micro-Gates section")

          if failures:
              print("ERROR: Review/ship artifact contract failed")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)

          print("OK: Review/ship artifact contract satisfied")
          PY

      - name: Verify SKILLS.md inventory sync
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          skills_md = (root / "skills/SKILLS.md").read_text(encoding="utf-8")
          table_rows = set(re.findall(r"\|\s*\d+\s*\|\s*\[`([^`]+)`\]", skills_md))
          dir_names = {
              d.name
              for d in (root / "skills").iterdir()
              if d.is_dir() and not d.name.startswith("_")
          }
          if table_rows != dir_names:
              print("ERROR: SKILLS.md table mismatch")
              print("missing_in_table:", sorted(dir_names - table_rows))
              print("extra_in_table:", sorted(table_rows - dir_names))
              sys.exit(1)
          print(f"OK: SKILLS.md lists {len(dir_names)} skills")
          PY

      - name: Verify plugin default prompts cover active skills
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          skills_md = (root / "skills/SKILLS.md").read_text(encoding="utf-8")
          active_skills = set(re.findall(r"\|\s*\d+\s*\|\s*\[`([^`]+)`\]", skills_md)) - {"forgeflow"}
          failures = []

          surfaces = [
              (".codex-plugin/plugin.json", lambda skill: "/forgeflow-init" if skill == "forgeflow-init" else f"/forgeflow:{skill}"),
              (".cursor-plugin/plugin.json", lambda skill: "/forgeflow-init" if skill == "forgeflow-init" else f"/{skill}"),
          ]

          for path, expected_prompt in surfaces:
              data = json.loads((root / path).read_text(encoding="utf-8"))
              prompts = data.get("interface", {}).get("defaultPrompt", [])
              prompt_text = "\n".join(prompts)
              if not isinstance(prompts, list) or not all(isinstance(item, str) for item in prompts):
                  failures.append(f"{path}: interface.defaultPrompt must be a list of strings")
                  continue
              missing = sorted(skill for skill in active_skills if expected_prompt(skill) not in prompt_text)
              if missing:
                  failures.append(f"{path}: defaultPrompt missing active skills {missing}")

          if failures:
              print("ERROR: Plugin defaultPrompt active-skill coverage failed")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          print(f"OK: Plugin default prompts cover {len(active_skills)} active skills")
          PY

      - name: Verify GEMINI.md imports
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          gemini_path = root / "GEMINI.md"
          gemini = gemini_path.read_text(encoding="utf-8")
          imports = re.findall(r"@(\./skills/[^\s]+)", gemini)
          imported_paths = set(imports)
          missing = [p for p in imports if not (root / p.lstrip("./")).exists()]
          failures = []

          manifest = json.loads((root / "gemini-extension.json").read_text(encoding="utf-8"))
          if manifest.get("contextFileName") != "GEMINI.md":
              failures.append("gemini-extension.json: contextFileName must be GEMINI.md")

          if "./skills/SKILLS.md" not in imported_paths:
              failures.append("GEMINI.md: missing @./skills/SKILLS.md inventory import")

          active_skills = {
              d.name
              for d in (root / "skills").iterdir()
              if d.is_dir() and not d.name.startswith("_")
          }
          expected_imports = {f"./skills/{name}/SKILL.md" for name in active_skills}
          missing_active = sorted(expected_imports - imported_paths)
          stale_active = sorted(
              p for p in imported_paths
              if p.startswith("./skills/") and p.endswith("/SKILL.md") and p not in expected_imports
          )
          if missing_active:
              failures.append(f"GEMINI.md: missing active skill imports {missing_active}")
          if stale_active:
              failures.append(f"GEMINI.md: imports stale skill paths {stale_active}")
          for item in missing:
              failures.append(f"GEMINI.md: broken import {item}")

          if failures:
              print("ERROR: Gemini extension import contract failed")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          print(f"OK: GEMINI.md imports inventory and {len(active_skills)} active skills")
          PY

      - name: Verify evals.json schema
        run: |
          python3 - <<'PY'
          import json
          import pathlib
          import sys

          data = json.loads((pathlib.Path("evals/evals.json")).read_text(encoding="utf-8"))
          failures = []
          allowed_assertion_types = {
              "contains",
              "contains_all",
              "contains_any",
              "not_contains",
              "not_contains_any",
          }
          if not isinstance(data.get("skill_name"), str):
              failures.append("skill_name missing")
          evals = data.get("evals")
          if not isinstance(evals, list) or not evals:
              failures.append("evals must be non-empty list")
          else:
              for i, item in enumerate(evals):
                  for key in ("id", "name", "prompt", "expected_output", "files", "assertions"):
                      if key not in item:
                          failures.append(f"eval[{i}] missing {key}")
                  for key in ("name", "prompt", "expected_output"):
                      if key in item and (not isinstance(item.get(key), str) or not item.get(key).strip()):
                          failures.append(f"eval[{i}] {key} must be a non-empty string")
                  files = item.get("files")
                  if not isinstance(files, list) or not all(isinstance(path, str) for path in files):
                      failures.append(f"eval[{i}] files must be a list of strings")
                  assertions = item.get("assertions")
                  if not isinstance(assertions, list) or not assertions:
                      failures.append(f"eval[{i}] assertions must be non-empty list")
                      continue
                  for j, assertion in enumerate(assertions):
                      if not isinstance(assertion, dict):
                          failures.append(f"eval[{i}].assertions[{j}] must be object")
                          continue
                      assertion_type = assertion.get("type")
                      if assertion_type not in allowed_assertion_types:
                          failures.append(
                              f"eval[{i}].assertions[{j}] unknown type {assertion_type!r}"
                          )
                      if assertion_type in {"contains", "not_contains"}:
                          if not isinstance(assertion.get("value"), str) or not assertion.get("value"):
                              failures.append(f"eval[{i}].assertions[{j}] must include non-empty string value")
                      elif assertion_type in {"contains_all", "contains_any", "not_contains_any"}:
                          values = assertion.get("values")
                          if not isinstance(values, list) or not values or not all(isinstance(v, str) and v for v in values):
                              failures.append(f"eval[{i}].assertions[{j}] must include non-empty string values")

          if failures:
              print("ERROR: evals/evals.json schema invalid")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          print(f"OK: evals/evals.json schema valid ({len(evals)} cases)")
          PY

      - name: Verify workflow skills have Exit Condition
        run: |
          python3 - <<'PY'
          import pathlib
          import sys

          root = pathlib.Path("skills")
          skip = {"forgeflow"}
          failures = []
          for skill_md in sorted(root.glob("*/SKILL.md")):
              if skill_md.parent.name in skip:
                  continue
              if "## Exit Condition" not in skill_md.read_text(encoding="utf-8"):
                  failures.append(str(skill_md))
          if failures:
              print("ERROR: Missing ## Exit Condition:")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          print("OK: Workflow skills include Exit Condition")
          PY

      - name: Verify CHANGELOG release links
        run: |
          python3 - <<'PY'
          import pathlib
          import sys

          expected = (pathlib.Path("VERSION")).read_text(encoding="utf-8").strip()
          changelog = (pathlib.Path("CHANGELOG.md")).read_text(encoding="utf-8")
          failures = []
          if f"## [{expected}]" not in changelog:
              failures.append(f"missing section ## [{expected}]")
          if f"[{expected}]:" not in changelog:
              failures.append(f"missing compare link [{expected}]:")
          if "[Unreleased]:" not in changelog:
              failures.append("missing [Unreleased]: compare link")
          if failures:
              print("ERROR: CHANGELOG release hygiene failed")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          print("OK: CHANGELOG release links present")
          PY

      - name: Verify adapter-config contract
        run: |
          python3 - <<'PY'
          import pathlib
          import sys

          root = pathlib.Path(".")
          failures = []
          adapter = (root / "docs/adapter-config.md").read_text(encoding="utf-8")
          forgeflow = (root / "skills/forgeflow/SKILL.md").read_text(encoding="utf-8")

          for signal in ("CLAUDE_CODE_SESSION", "CODEX_SESSION", "GEMINI_CLI", ".cursor/"):
              if signal not in adapter:
                  failures.append(f"docs/adapter-config.md: missing {signal}")

          if "### Cursor" not in adapter:
              failures.append("docs/adapter-config.md: missing Cursor section")

          if "docs/adapter-config.md" not in forgeflow:
              failures.append("skills/forgeflow/SKILL.md: must reference docs/adapter-config.md")

          if "| Claude Code | `CLAUDE_CODE_SESSION` env var, or `.claude/`" in forgeflow:
              failures.append("skills/forgeflow/SKILL.md: duplicate adapter table; link to docs/adapter-config.md only")

          readme = (root / "README.md").read_text(encoding="utf-8")
          if "docs/adapter-config.md" not in readme:
              failures.append("README.md: missing docs/adapter-config.md link")
          for snippet in (
              "mkdir -p .codex/plugins/forgeflow",
              "cp -R /path/to/forgeflow/.codex-plugin/plugin.json /path/to/forgeflow/skills /path/to/forgeflow/templates .codex/plugins/forgeflow/",
              "templates/`를 함께 갱신",
          ):
              if snippet not in readme:
                  failures.append(f"README.md: missing actionable Codex local install snippet: {snippet}")

          if failures:
              print("ERROR: Adapter-config contract failed")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          print("OK: Adapter-config contract satisfied")
          PY

      - name: Verify GEMINI.md imports all workflow skills
        run: |
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          root = pathlib.Path(".")
          skills_md = (root / "skills/SKILLS.md").read_text(encoding="utf-8")
          table_rows = set(re.findall(r"\|\s*\d+\s*\|\s*\[`([^`]+)`\]", skills_md))
          gemini = (root / "GEMINI.md").read_text(encoding="utf-8")
          imports = set(re.findall(r"@\./skills/([^/\s]+)/SKILL\.md", gemini))
          missing = sorted(table_rows - imports - {"forgeflow"})
          if missing:
              print("ERROR: GEMINI.md missing skill imports:")
              for item in missing:
                  print(f"- {item}")
              sys.exit(1)
          print(f"OK: GEMINI.md imports all {len(table_rows)} workflow skills")
          PY

      - name: Verify no requirements.md ghost references
        run: |
          python3 - <<'PY'
          import pathlib
          import sys

          root = pathlib.Path("skills")
          failures = []
          for skill_md in root.rglob("SKILL.md"):
              if "requirements.md" in skill_md.read_text(encoding="utf-8"):
                  failures.append(str(skill_md))
          if failures:
              print("ERROR: requirements.md still referenced in:")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          print("OK: No requirements.md ghost references")
          PY

      - name: Verify medium sub-band template fields
        run: |
          python3 - <<'PY'
          import pathlib
          import sys

          checks = [
              ("templates/brief.md", "Route Sub-band"),
              ("templates/plan.md", "Route Sub-band"),
              ("skills/plan/SKILL.md", "medium-light"),
              ("skills/review/SKILL.md", "medium-full"),
          ]
          failures = []
          for path, needle in checks:
              if needle not in (pathlib.Path(path)).read_text(encoding="utf-8"):
                  failures.append(f"{path}: missing {needle}")
          if failures:
              print("ERROR: Medium sub-band contract failed")
              for failure in failures:
                  print(f"- {failure}")
              sys.exit(1)
          print("OK: Medium sub-band template/skill contract satisfied")
          PY
