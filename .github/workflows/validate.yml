name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  repo-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: make setup

      - name: Check ForgeFlow environment
        run: make check-env

      - name: Run full repo validation
        run: make validate

      - name: Run full pytest suite
        run: .venv/bin/python -m pytest -q

  generated-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: make setup

      - name: Check ForgeFlow environment
        run: make check-env

      - name: Regenerate adapters and fail on drift
        run: .venv/bin/python scripts/validate_generated.py

  windows-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        shell: pwsh
        run: .\scripts\setup.ps1

      - name: Run Windows validation smoke
        shell: pwsh
        run: .\scripts\validate.ps1

      - name: Smoke task init
        shell: pwsh
        run: .\scripts\run_orchestrator.ps1 init --task-id windows-smoke --objective "Validate Windows wrapper" --risk low

  plugin-smoke-matrix:
    name: plugin-smoke-matrix (${{ matrix.os }}, ${{ matrix.surface }}, ${{ matrix.route_label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        surface: [claude, codex]
        route_label: [small, medium, large_high_risk]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run plugin smoke matrix
        shell: bash
        run: python scripts/ci_plugin_smoke_matrix.py --surface "${{ matrix.surface }}" --route-label "${{ matrix.route_label }}"
