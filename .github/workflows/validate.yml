name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  repo-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: make setup

      - name: Check ForgeFlow environment
        run: make check-env

      - name: Run full repo validation
        run: make validate

      - name: Run full pytest suite
        run: .venv/bin/python -m pytest -q

  generated-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: make setup

      - name: Check ForgeFlow environment
        run: make check-env

      - name: Regenerate adapters and fail on drift
        run: .venv/bin/python scripts/validate_generated.py
