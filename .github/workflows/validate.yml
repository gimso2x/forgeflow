name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify no Python files remain
        run: |
          count=$(find . -name '*.py' -not -path './.git/*' | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "ERROR: Found $count Python files (should be 0)"
            find . -name '*.py' -not -path './.git/*'
            exit 1
          fi
          echo "OK: No Python files found"

      - name: Verify all skills have SKILL.md
        run: |
          for dir in skills/*/; do
            if [ ! -f "${dir}SKILL.md" ]; then
              echo "ERROR: Missing SKILL.md in $dir"
              exit 1
            fi
          done
          echo "OK: All skills have SKILL.md"

      - name: Verify plugin configs are valid JSON
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json .codex-plugin/plugin.json gemini-extension.json; do
            if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "ERROR: Invalid JSON in $f"
              exit 1
            fi
          done
          echo "OK: All plugin configs are valid JSON"

      - name: Verify templates exist
        run: |
          for t in brief.md plan.md review-report.md implementation-notes.md eval-record.md roadmap.md; do
            if [ ! -f "templates/$t" ]; then
              echo "ERROR: Missing template templates/$t"
              exit 1
            fi
          done
          echo "OK: All templates exist"
